<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitify</title>
    <style>
        body {
            font-family: 'Georgia', serif; /* Более элегантный шрифт */
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%); /* Нежный градиент */
            color: #333;
            line-height: 1.8;
            text-align: center; /* Центрирование всего контента */
        }
        .container {
            width: 85%;
            max-width: 900px; /* Ограничение ширины */
            margin: 50px auto;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.8); /* Полупрозрачный белый фон */
            border-radius: 15px; /* Скругленные углы */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Улучшенная тень */
        }
        h1 {
            font-size: 3em; /* Большой заголовок */
            color: #00796b; /* Цвет заголовка */
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px rgba(178, 235, 242, 0.5); /* Легкая тень для заголовка */
        }
        p {
            font-size: 1.1em; /* Увеличенный размер шрифта для текста */
            margin-bottom: 25px;
            color: #4f5a64; /* Цвет текста */
            text-align: justify; /* Выравнивание текста по ширине */
        }
        .quote {
            font-style: italic; /* Курсив для цитат */
            color: #004d40; /* Темный цвет для цитат */
            font-size: 1.2em;
            margin: 40px 0;
            padding: 20px;
            border-left: 5px solid #00796b; /* Выделение рамкой */
            background-color: rgba(178, 235, 242, 0.2); /* Легкий фон для цитаты */
        }
        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.9em;
            color: #78909c; /* Приглушенный цвет для футера */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Glitify: новый мод</h1>
        <p>
            Новые рассширения, спрайты и звуки! 
        </p>
        <p>
            Glitify - предстоящий мод скретча с эпическеми новыми песнями, смешными звуками, векторными спрайтами и удивительными рассширениями.
        </p>
        </div>
    </div>
</body>
</html>
